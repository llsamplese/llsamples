        Preto Principal: #212121 (Dark Grey, quase preto)
        Preto para fundo/elementos mais escuros: #000000 (Black)
        Cinza para texto secundário: #B0BEC5 (Light Blue Grey) ou #757575 (Grey)
        Cinza para elementos internos: #3A3A3A, #424242

    body {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        display: flex;
        margin: 0;
        background-color: #FFD700; /* Fundo amarelo sólido */
        color: #E0E0E0; /* Cor de texto padrão para o body (se houver texto solto) */
        min-height: 100vh;
    }

    .container {
        display: flex;
        width: 100%;
        min-height: 100vh;
        gap: 20px;
        padding: 20px;
    }

    .form-panel {
        width: 35%;
        background: #212121; /* Fundo preto para o painel do formulário */
        box-shadow: 0 20px 60px rgba(0,0,0,0.5); /* Sombra mais escura */
        padding: 30px;
        border-radius: 20px;
        overflow-y: auto;
        animation: slideInLeft 0.5s ease;
        color: #E0E0E0; /* Texto claro dentro do painel */
    }

    .preview-panel {
        flex: 1;
        padding: 30px;
        background: #212121; /* Fundo preto para o painel de preview */
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5); /* Sombra mais escura */
        overflow-y: auto;
        animation: slideInRight 0.5s ease;
        color: #2c3e50; /* Alterado para texto claro, para combinar com o tema dark */
    }

    @keyframes slideInLeft {
        from {
            opacity: 0;
            transform: translateX(-50px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    @keyframes slideInRight {
        from {
            opacity: 0;
            transform: translateX(50px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    h2 {

    .logo-box {

        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.5); /* Sombra mais escura */
    }

    .logo-preview {
        height: 60px;
        width: auto;
        filter: invert(80%) sepia(100%) saturate(2000%) hue-rotate(350deg) brightness(100%) contrast(100%); /* Tenta deixar a logo amarela */
        display: block;
    }

    label {
        font-weight: 600;
        margin-top: 15px;
        display: block;
        color: #FFC107; /* Amarelo principal para labels */
        font-size: 0.9em;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
    }

    input, textarea {
        width: 100%;
        border: 2px solid #424242; /* Borda cinza escuro */
        border-radius: 10px;
        padding: 12px 15px;
        font-size: 15px;
        transition: all 0.3s ease;
        font-family: 'Inter', sans-serif;
        background: #3A3A3A; /* Fundo cinza escuro para inputs/textareas */
        color: #E0E0E0; /* Texto claro */
    }

    input:focus, textarea:focus {
        outline: none;
        border-color: #FFC107; /* Borda amarela no foco */
        background: #424242; /* Fundo um pouco mais claro no foco */
        box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.3); /* Sombra amarela */
        transform: translateY(-2px);
    }

    .desconto-group {
        display: flex;
        gap: 15px;
        margin-top: 10px;
    }

    .desconto-group > div {
        flex: 1;
    }

    .sample-list {
        max-height: 320px;
        overflow-y: auto;
        border: 2px solid #424242; /* Borda cinza escuro */
        border-radius: 12px;
        padding: 15px;
        background: #3A3A3A; /* Fundo cinza escuro para a lista de samples */
        margin-top: 10px;
    }

    .sample-list::-webkit-scrollbar {
        width: 8px;
    }

    .sample-list::-webkit-scrollbar-track {
        background: #212121; /* Fundo da barra de rolagem preto */
        border-radius: 10px;
    }

    .sample-list::-webkit-scrollbar-thumb {
        background: #FFC107; /* Cor do "polegar" da barra de rolagem amarelo */
        border-radius: 10px;
    }

    .sample-item {
        display: flex;
        align-items: center;
        padding: 10px;
        margin-bottom: 8px;
        background: #212121; /* Fundo preto para cada item da lista */
        border-radius: 8px;
        transition: all 0.2s ease;
        cursor: pointer;
    }

    .sample-item:hover {
        background: #3A3A3A; /* Fundo um pouco mais claro no hover */
        transform: translateX(5px);
    }

    .sample-item input[type="checkbox"] {
        margin-right: 12px;
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: #FFC107; /* Cor do checkbox amarelo */
    }

    .sample-item label {
        margin: 0;
        cursor: pointer;
        font-weight: 500;
        color: #E0E0E0; /* Texto claro para o nome do sample */
        text-transform: none;
        font-size: 0.95em;
    }

    button {
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        color: #212121; /* Texto preto padrão para botões */
        font-weight: 600;
        font-size: 14px;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); /* Sombra mais escura */
        width: 100%; /* Garante que os botões preencham a largura disponível nos grupos */
        margin: 0; /* Remove margens padrão que podem causar desalinhamento */
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        filter: brightness(1.1); /* Leve brilho no hover */
    }

    button:active {
        transform: translateY(0);
    }

    .btn-generate {
        background: #FFC107; /* Amarelo principal para gerar */
    }

    .btn-copy {
        background: #FFD700; /* Amarelo mais claro para copiar */
    }

    .btn-clear {
        background: #424242; /* Cinza escuro para limpar */
        color: #E0E0E0; /* Texto claro */
    }

    /* Removido .btn-select pois não é mais usado com a nova estrutura de botões */
    /* .btn-select {
        background: #FFC107;
        color: #212121;
        width: 100%;
        margin-bottom: 10px;
    } */

    .preview-panel h2 {
        color: #E0E0E0; /* Amarelo principal para o título do preview */
        border-bottom: 3px solid #FFC107; /* Borda amarela */
        padding-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    #previewArea h2 {
        display: block !important;
        text-align: center !important;
        border-bottom: none !important;
    }

    #previewArea {
        color: #2c3e50; /* Garante que o texto dentro da previewArea seja claro */
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .total {
        font-weight: 700;
        font-size: 1.2em;
        margin-top: 15px;
        padding: 15px;
        background: #3A3A3A; /* Fundo cinza escuro */
        border-radius: 10px;
        border-left: 4px solid #FFC107; /* Borda amarela */
        color: #E0E0E0; /* Texto claro */
    }

    .valor-final {
        color: #FFD700; /* Amarelo mais claro para o valor final */
        font-weight: 700;
        font-size: 1.3em;
        margin-top: 10px;
        padding: 15px;
        background: #212121; /* Fundo preto */
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .desconto-texto {
        color: #FFD700; /* Amarelo para o texto de desconto */
        font-weight: 600;
        margin-top: 10px;
        padding: 12px;
        background: #212121; /* Fundo preto */
        border-radius: 8px;
        border-left: 4px solid #FFC107; /* Borda amarela */
    }

    .no-results {
        text-align: center;
        color: #B0BEC5; /* Cinza claro */
        font-style: italic;
        padding: 20px;
    }

    /* Estilos para o novo layout de botões */
    .button-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* 2 colunas em telas maiores */
        gap: 15px; /* Espaçamento entre os grupos */
        margin-top: 20px;
    }

    .button-group {
        display: flex;
        flex-direction: column; /* Botões dentro do grupo empilhados verticalmente */
        gap: 8px; /* Espaçamento entre os botões dentro de um grupo */
        padding: 15px; /* Padding para separar visualmente os grupos */
        background: #3A3A3A; /* Fundo cinza escuro para os grupos */
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        border: 1px solid #424242; /* Borda sutil para os grupos */
    }

    .button-group.main-action {
        grid-column: 1 / -1; /* Ocupa as duas colunas */
        background: #212121; /* Fundo mais escuro para o grupo principal */
        border-color: #FFC107; /* Borda amarela para destaque */
        padding: 10px;
    }

    .button-group.main-action .btn-generate {
        font-size: 1.1em;
        padding: 15px 20px;
        font-weight: 700;
    }

    .button-group.secondary-actions {
        grid-column: 1 / -1; /* Ocupa as duas colunas */
        flex-direction: row; /* Botões lado a lado dentro deste grupo */
        justify-content: space-around; /* Espaça os botões */
        background: #212121;
        border-color: #757575;
    }

    .button-group.secondary-actions button {
        flex: 1; /* Faz com que os botões ocupem o espaço disponível igualmente */
        margin: 0 5px; /* Pequeno espaçamento entre eles */
    }

    /* Estilos para os botões de gradiente */
    .btn-gradient-green {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); /* Gradiente verde */
        color: #212121; /* Texto escuro para contraste */
    }

    .btn-gradient-green:hover {
        filter: brightness(1.15);
    }

    .btn-gradient-pink {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); /* Gradiente rosa/vermelho */
        color: #212121; /* Texto escuro para contraste */
    }

    .btn-gradient-pink:hover {
        filter: brightness(1.15);
    }

    /* Media Queries para Responsividade */
    @media (max-width: 1024px) {
        .container {
            flex-direction: column; /* Coloca os painéis um abaixo do outro */
            padding: 15px;
            gap: 15px; /* Ajusta o gap entre os painéis */
        }
        .form-panel {
            width: 100%; /* Ocupa a largura total */
            margin-bottom: 0; /* Remove margem inferior, o gap do container já cuida */
        }
        .preview-panel {
            width: 100%; /* Ocupa a largura total */
            animation: fadeIn 0.5s ease; /* Animação de fade-in para a preview */
        }
        .button-grid {
            grid-template-columns: 1fr; /* Uma coluna para os grupos de botões em telas menores */
        }
        .button-group.secondary-actions {
            flex-direction: column; /* Empilha os botões secundários em telas menores */
            margin: 0; /* Remove margens laterais */
        }
        .button-group.secondary-actions button {
            margin: 0; /* Remove margens laterais internas */
        }
    }

    @media (max-width: 768px) {
        body {
            font-size: 14px;
        }
        h2 {
            font-size: 1.5em;
        }
        .container {
            padding: 10px;
            gap: 10px;

        .form-panel,
        .preview-panel {
            padding: 20px;
            border-radius: 15px;
        }
        #previewArea {
            padding: 20px;
        }
        .sample-list {
            max-height: 250px;
        }
        button {
            padding: 10px 15px;
            font-size: 13px;
        }
    }

    /* ===== IMPRESSÃO / PDF ===== */
    #pdfTemp {

    @media print {

</style>

   function normalizeString(str) {
    let normalized = str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    // Padronizar "vX" e "X.0" para "vX"
    // Ex: "v2" e "2.0" se tornam "v2"
    // Ex: "v3" e "3.0" se tornam "v3"
    normalized = normalized.replace(/(\s|^)v(\d+)/g, '$1v$2'); // Garante que 'v2' seja 'v2'
    normalized = normalized.replace(/(\s|^)(\d+)\.0/g, '$1v$2'); // Converte '2.0' para 'v2'
    // Remover espaços extras que podem surgir após as substituições
    return normalized.trim().replace(/\s+/g, ' ');
}

const samplesData = rawData.split("\n").map(l => {
  const [nome, link, valor] = l.split("|");
  return { nome, link, valor: parseFloat(valor) };
});


let selectedSamples = new Set();
const container = document.getElementById("samplesContainer");

function renderSamples(filter="") {
    container.innerHTML = "";
    const normalizedFilter = normalizeString(filter); // Normaliza o filtro de busca

    const filtered = samplesData.filter(s => {
        const normalizedSampleName = normalizeString(s.nome); // Normaliza o nome do sample

        // Se o filtro contém uma versão específica (ex: "v3"), busca exata pela versão
        const filterVersionMatch = normalizedFilter.match(/v(\d+(\.\d+)?)$/);
        const sampleVersionMatch = normalizedSampleName.match(/v(\d+(\.\d+)?)$/);

        if (filterVersionMatch) {
            // Se o filtro tem versão, busca exata pela versão e pelo nome base
            const filterBaseName = normalizedFilter.replace(/v(\d+(\.\d+)?)$/, '').trim();
            const sampleBaseName = normalizedSampleName.replace(/v(\d+(\.\d+)?)$/, '').trim();

            return sampleBaseName.includes(filterBaseName) && filterVersionMatch[0] === (sampleVersionMatch ? sampleVersionMatch[0] : '');
        } else {
            // Se o filtro NÃO tem versão, busca por qualquer versão ou sem versão
            return normalizedSampleName.includes(normalizedFilter);
        }
    });

    if (filtered.length === 0) {
        container.innerHTML = "<p class='no-results'>Nenhum sample encontrado.</p>";
        return;
    }
    filtered.forEach((s) => {
        const globalIndex = samplesData.indexOf(s);
        const div = document.createElement("div");
        div.className = "sample-item";
        const checked = selectedSamples.has(globalIndex) ? "checked" : "";
        div.innerHTML = `
            <input type="checkbox" value="${globalIndex}" ${checked} id="sample_${globalIndex}">
            <label for="sample_${globalIndex}">${s.nome} - R$${s.valor.toFixed(2)}</label>`;
        container.appendChild(div);
    });
}




renderSamples();

container.addEventListener("change", e => {
  if (e.target.type === "checkbox") {
    const id = parseInt(e.target.value);
    e.target.checked ? selectedSamples.add(id) : selectedSamples.delete(id);
  }
});

document.getElementById("sampleSearch").addEventListener("input", e => renderSamples(e.target.value));

document.getElementById("toggleSelect").addEventListener("click", () => {
  const allSelected = selectedSamples.size === samplesData.length;
  selectedSamples = allSelected ? new Set() : new Set(samplesData.map((_, i) => i));
  renderSamples(document.getElementById("sampleSearch").value);
  document.getElementById("toggleSelect").textContent = allSelected ? "Selecionar Todos" : "Limpar Seleção";
});

function buscarESelecionarMultiplos() {
    const texto = document.getElementById("sampleSearch").value;
    const linhas = texto.split('\n').map(l => l.trim()).filter(l => l.length > 0);

    if (linhas.length === 0) {
        alert("⚠️ Digite os nomes dos samples (um por linha)!");
        return;
    }

    let encontrados = 0;
    let naoEncontrados = [];

    selectedSamples.clear(); // Limpa a seleção anterior antes de buscar

    linhas.forEach(busca => {
        const normalizedBusca = normalizeString(busca); // Normaliza a busca do usuário
        let achouParaEstaBusca = false;

        // Extrai a versão da busca, se houver (ex: "v3", "v2")
        const buscaVersionMatch = normalizedBusca.match(/v(\d+(\.\d+)?)$/);
        const buscaBaseName = buscaVersionMatch ? normalizedBusca.replace(buscaVersionMatch[0], '').trim() : normalizedBusca;

        samplesData.forEach((sample, index) => {
            const normalizedSampleName = normalizeString(sample.nome); // Normaliza o nome do sample

            // Extrai a versão do nome do sample, se houver
            const sampleVersionMatch = normalizedSampleName.match(/v(\d+(\.\d+)?)$/);
            const sampleBaseName = sampleVersionMatch ? normalizedSampleName.replace(sampleVersionMatch[0], '').trim() : normalizedSampleName;

            let match = false;

            if (buscaVersionMatch) {
                // Se a busca tem uma versão (ex: "LL Guitarra Piseiro v3")
                // Deve corresponder ao nome base E à versão exata
                if (sampleBaseName.includes(buscaBaseName) && (sampleVersionMatch && sampleVersionMatch[0] === buscaVersionMatch[0])) {
                    match = true;
                }
            } else {
                // Se a busca NÃO tem uma versão (ex: "LL Guitarra Piseiro")
                // Deve corresponder ao nome base, ignorando a versão do sample
                if (normalizedSampleName.includes(normalizedBusca)) {
                    match = true;
                }
            }

            if (match) {
                selectedSamples.add(index);
                achouParaEstaBusca = true;
            }
        });

        if (!achouParaEstaBusca) {
            naoEncontrados.push(busca);
        } else {
            encontrados++;
        }
    });

    renderSamples(document.getElementById("sampleSearch").value); // Renderiza os samples com o filtro atual para mostrar os selecionados

    let mensagem = `✅ ${encontrados} sample(s) encontrado(s) e selecionado(s)!`;
    if (naoEncontrados.length > 0) {
        mensagem += `\n\n⚠️ Não encontrados:\n${naoEncontrados.join('\n')}`;
    }

    alert(mensagem);
}

// Samples que são APENAS instrumento solo (sem "Loops Práticos para DAW")
const samplesSoloOnly = new Set([
  "LL Guitarra Distorção",
  "LL Metais",
  "LL Metais v2",
  "LL Metais v3",
  "LL Sax v1.5",
  "LL Strings"
]);

// Ícone por instrumento
function getIcone(nome) {
  const n = nome.toLowerCase();
  if (n.includes('guitarra') || n.includes('distorção')) return '🎸';
  if (n.includes('bass'))      return '🎸';
  if (n.includes('acordeon'))  return '🪗';
  if (n.includes('violão') || n.includes('violao')) return '🎸';
  if (n.includes('piano'))     return '🎹';
  if (n.includes('sax'))       return '🎷';
  if (n.includes('metais'))    return '🎺';
  if (n.includes('strings'))   return '🎻';
  if (n.includes('ukulele'))   return '🪕';
  if (n.includes('cavaco'))    return '🪕';
  if (n.includes('keys') || n.includes('synth')) return '🎹';
  if (n.includes('drums') || n.includes('percuss') || n.includes('rythm')) return '🥁';
  return '🎵';
}

// Bloco de card de apresentação (modo 1 sample)
function gerarCardApresentacao(s) {
  const icone = getIcone(s.nome);
  const nomeUpper = s.nome.toUpperCase();
  const valorCartao = (s.valor * 1.0524).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
  const valorPix    = s.valor.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
  const soloOnly    = samplesSoloOnly.has(s.nome);
  const video       = videosDemo[s.nome] || '';

  const linhaInstrumento = soloOnly
    ? `▶️ Instrumentos Solo.`
    : `▶️ Instrumentos Solo e Loops Práticos para DAW.`;

  return [
    `${icone} *${nomeUpper}*`,
    ``,
    `✅ Kontakt compatível → 6.6.0 ou Superior`,
    `🔄 BPM sincroniza automaticamente com a DAW.`,
    linhaInstrumento,
    ``,
    `- Aceitamos:`,
    `💳 Cartão c/ acréscimo: ${valorCartao}`,
    `💵 *Pix: ${valorPix}*`,
    video ? `\nDEMONSTRAÇÃO⤵️\n${video}` : ''
  ].filter(l => l !== undefined).join('\n');
}

function copiarParteBaixo() {

  for (const [nome, instrucoes] of Object.entries(instrucoesEspeciais)) {

function copiarParteCimaComVideos() {
    const preview = document.getElementById("previewArea");
    if (!preview) {
        alert("⚠️ Gere o orçamento primeiro!");
        return;
    }

    // Modo especial: 1 sample selecionado → card de apresentação
    if (selectedSamples.size === 1) {
        const idx = [...selectedSamples][0];
        const s = samplesData[idx];
        const card = gerarCardApresentacao(s);

        const textarea = document.createElement('textarea');
        textarea.value = card;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert("✅ Card de apresentação copiado! 🎥");
        return;
    }

    // Modo padrão: múltiplos samples → lista com vídeos
    const clone = preview.cloneNode(true);
    const msgNode = clone.querySelector("#mensagemPronta");
    if (msgNode) msgNode.remove();

    const parcelasContainer = document.querySelector('.parcelas-container');
    const parcelasVisiveis = parcelasContainer && parcelasContainer.classList.contains('show');
    if (!parcelasVisiveis) {
        const parcelasNode = clone.querySelector('.parcelas-container');
        if (parcelasNode) parcelasNode.remove();
    }

    // Mesma limpeza do copiarParteCima
    let texto = clone.innerText
      .replace(/\r/g, '')
      .replace(/^\s+/gm, '')
      .replace(/[ \t]+/g, ' ')
      .replace(/\n{3,}/g, '\n\n')
      .trim();

    texto = texto.replace(/([^\n])•/g, '$1\n•');

    texto = texto
      .replace(/(🎹 LL SAMPLES 🎹)/g, '$1\n')
      .replace(/(🌟 ORÇAMENTO ESPECIAL[^\n]+)/g, '\n$1\n')
      .replace(/(🗒️ SAMPLES SELECIONADOS:)/g, '\n$1')
      .replace(/(💰 Valor Bruto[^\n]+)/g, '\n$1')
      .replace(/(💳 Total Final[^\n]+)/g, '\n$1')
      .replace(/(💵 Total Final[^\n]+)/g, '$1')
      .replace(/\n{3,}/g, '\n\n');

    // Injeta vídeo após cada linha de sample (• Nome - R$ X)
    texto = texto.replace(/^(• .+)$/gm, (linha) => {
        const nome = linha.split(' - ')[0].replace('•', '').trim();
        const video = videosDemo[nome];
        return video ? linha + '\n🎥 Vídeo: ' + video : linha;
    });

    // Garante uma linha em branco entre o vídeo de um sample e o bullet do próximo
    texto = texto.replace(/(🎥 Vídeo: [^\n]+)\n(•)/g, '$1\n\n$2');

    const textarea = document.createElement('textarea');
    textarea.value = texto;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    alert("✅ Copiado com vídeos! 🎥");
}

function gerarHTMLParcelasPDF(valorFinal) {
  const valorCartao = valorFinal * 1.0524;
  let html = `
    <div style="margin:20px 0; padding:15px; background:#f7fafc; border:2px solid #667eea; border-radius:10px;">
      <h3 style="color:#667eea; text-align:center; margin:0 0 15px 0; font-size:18px;">💳 SIMULAÇÃO DE PARCELAMENTO NO CARTÃO</h3>
  `;

  for (let parcela = 1; parcela <= 12; parcela++) {
    const taxaDecimal = taxasParcelas[parcela] / 100;
    const valorComJuros = valorCartao * (1 + taxaDecimal);
    const valorParcela = valorComJuros / parcela;
    const valorTotal = valorParcela * parcela;

    const bgColor = parcela === 1 ? '#d4fc79' : 'white';
    const borderColor = parcela === 1 ? '#38a169' : '#e2e8f0';

    const textoAcrescimo = parcela === 1 
      ? '<span style="color:#38a169; font-style:italic;">(Sem acréscimo adicional)</span>' 
      : `<span style="color:#e53e3e; font-style:italic;">+${taxasParcelas[parcela]}% = ${valorTotal.toLocaleString('pt-BR', {style:'currency', currency:'BRL'})}</span>`;

    html += `
      <div style="background:${bgColor}; padding:10px; margin:5px 0; border-left:4px solid ${borderColor}; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:600; color:#667eea; font-size:16px;">${parcela}x</span>
        <span style="font-size:18px; font-weight:700; color:#2d3748;">${valorParcela.toLocaleString('pt-BR', {style:'currency', currency:'BRL'})}</span>
        <span style="font-size:14px;">${textoAcrescimo}</span>
      </div>
    `;
  }

  html += `</div>`;
  return html;
}



function imprimirPDF(conteudo, titulo) {
  if (!conteudo) return;
  const pdfTemp = document.getElementById('pdfTemp');
  pdfTemp.innerHTML = conteudo;

  const tituloOriginal = document.title;
  document.title = titulo || 'Orcamento_LL';

  alert("💡 Dica: Na janela de impressão, desmarque a opção \"Cabeçalhos e rodapés\" para remover o espaço no topo!");

  window.print();

  setTimeout(() => {
    document.title = tituloOriginal;
    pdfTemp.innerHTML = '';
  }, 1000);
}
